display_information:
  name: Translator
  description: Auto-translates messages between Japanese and English
  background_color: "#1a2b4c"
features:
  bot_user:
    display_name: translator
    always_online: true
oauth_config:
  scopes:
    bot:
      - channels:history
      - groups:history
      - chat:write
settings:
  event_subscriptions:
    request_url: https://YOUR-APP.vercel.app/api/slack/events
    bot_events:
      - message.channels
      - message.groups
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
